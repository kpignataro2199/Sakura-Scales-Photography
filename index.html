<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography Portfolio</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f9f9f9; margin: 0; color: #333; }
        
        header { 
            position: sticky; top: 0; z-index: 1000; 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #eee; padding: 20px; text-align: center;
        }

        nav a { text-decoration: none; color: #666; margin: 0 15px; font-weight: 500; transition: color 0.3s; }
        nav a:hover { color: #000; }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px; padding: 40px; max-width: 1200px; margin: 0 auto;
        }

        .photo-card {
            position: relative; overflow: hidden; border-radius: 15px;
            background: #eee; aspect-ratio: 4/5; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .photo-card img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.5s ease;
        }

        .photo-card:hover img { transform: scale(1.05); }

        .overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: white; padding: 20px; opacity: 0; transition: opacity 0.3s;
        }

        .photo-card:hover .overlay { opacity: 1; }
    </style>
</head>
<body>

    <header>
        <h1 style="margin: 0; font-weight: 300; letter-spacing: 2px; text-transform: uppercase;">Your Name Portfolio</h1>
        <nav style="margin-top: 15px;">
            <a href="index.html">Gallery</a>
            <a href="about.html">Story</a>
            <a href="contact.html">Booking</a>
        </nav>
    </header>

    <main>
        <section class="gallery">
            <div class="photo-card">
                <img src="YOUR_IMAGE_URL_1.jpg" alt="Nature Photography">
                <div class="overlay">
                    <h3 style="margin: 0;">Golden Hour</h3>
                    <p style="margin: 5px 0 0; font-size: 0.8rem;">Nature • 2026</p>
                </div>
            </div>

            <div class="photo-card">
                <img src="YOUR_IMAGE_URL_2.jpg" alt="Urban Photography">
                <div class="overlay">
                    <h3 style="margin: 0;">Concrete Jungle</h3>
                    <p style="margin: 5px 0 0; font-size: 0.8rem;">Architecture • 2026</p>
                </div>
            </div>

            <div class="photo-card">
                <img src="YOUR_IMAGE_URL_3.jpg" alt="Portrait Photography">
                <div class="overlay">
                    <h3 style="margin: 0;">Shadows</h3>
                    <p style="margin: 5px 0 0; font-size: 0.8rem;">Portrait • 2026</p>
                </div>
            </div>
        </section>
    </main>

    <footer style="text-align: center; padding: 60px; color: #999; font-size: 0.9rem;">
        &copy; 2026 Your Name Photography
    </footer>

</body>
</html>
